<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arcadia — Free Browser Games</title>
<meta name="description" content="A free browser games arcade. 30+ self-hosted HTML5 games — no downloads, no signups. Just press play.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-slot"></div>

<main id="main">
  <section class="hero">
    <div class="wrap">
      <h1>What are you playing?</h1>
      <p class="sub">Free browser games. No downloads, no signups.</p>
      <div class="hero-search">
        <span class="search-ic"><svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
        <input id="heroSearch" type="search" placeholder="Search 30+ games…" aria-label="Search games" autocomplete="off">
      </div>
    </div>
  </section>

  <div class="wrap">
    <section class="section reveal">
      <div class="section-head"><h2>Categories</h2></div>
      <div class="cats" id="cats"></div>
    </section>

    <section class="section reveal">
      <div class="section-head"><h2>Trending</h2><a class="more" href="games.html?sort=popular">All games <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a></div>
      <div class="scroller" id="trending"></div>
    </section>

    <section class="section reveal">
      <div class="section-head"><h2>Recently added</h2></div>
      <div class="grid" id="recent"></div>
    </section>
  </div>
</main>

<div id="footer-slot"></div>

<script src="js/games.js"></script>
<script src="js/app.js"></script>
<script>
(function () {
  window.ARCADIA_NAV("home");
  window.ARCADIA_FOOTER();
  var A = window.ARCADIA;

  var cats = document.getElementById("cats");
  A.cats.forEach(function (c) {
    var a = document.createElement("a");
    a.className = "cat-chip";
    a.href = "games.html?cat=" + c.id;
    a.innerHTML = '<span class="cat-dot" style="background:' + c.accent + '"></span>' + c.name;
    cats.appendChild(a);
  });

  var tr = document.getElementById("trending");
  A.trending(14).forEach(function (g) { tr.appendChild(window.ARCADIA_CARD(g)); });

  var rc = document.getElementById("recent");
  A.recent(10).forEach(function (g) { rc.appendChild(window.ARCADIA_CARD(g)); });

  var hs = document.getElementById("heroSearch");
  hs.addEventListener("keydown", function (e) { if (e.key === "Enter" && hs.value.trim()) window.location.href = "games.html?q=" + encodeURIComponent(hs.value.trim()); });

  window.ARCADIA_REVEAL();
})();
</script>
</body>
</html>
