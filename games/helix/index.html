<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Helix Jump — Arcadia</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:Inter,system-ui,sans-serif;background:#0A0A12;color:#ECECF5;overflow:hidden;display:flex;align-items:center;justify-content:center}
  #wrap{position:relative;width:100%;max-width:480px;margin:auto}
  canvas{width:100%;height:auto;display:block;background:#0A0A12;border-radius:14px;border:1px solid rgba(255,255,255,.08)}
  .hud{position:absolute;top:10px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}
  .hud .s{background:rgba(10,10,18,.7);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:5px 11px;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;backdrop-filter:blur(6px)}
  .hud .s span{color:#9a9ab5;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-right:5px}
  .ov{position:absolute;inset:0;display:grid;place-items:center;background:rgba(10,10,18,.82);backdrop-filter:blur(4px);border-radius:14px;text-align:center}
  .ov.hide{display:none}
  .ov h2{font-family:Syne,sans-serif;font-size:26px;margin-bottom:6px}
  .ov p{color:#9a9ab5;margin-bottom:14px;font-size:13px}
  .btn{padding:11px 20px;border-radius:10px;background:linear-gradient(90deg,#7C3AED,#9333ea);color:#fff;font-weight:600;border:none;cursor:pointer;font-size:14px}
  .btn:hover{filter:brightness(1.1)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="440" height="640"></canvas>
  <div class="hud"><div class="s"><span>Score</span><b id="sc">0</b></div><div class="s"><span>Best</span><b id="bs">0</b></div></div>
  <div class="ov" id="st"><div><h2>Helix Jump</h2><p>Rotate the tower so the ball falls through the gaps.</p><p style="margin-bottom:12px;font-size:12px">Drag / Arrow keys to rotate · avoid red arcs</p><button class="btn" id="start">Start</button></div></div>
  <div class="ov hide" id="go"><div><h2 style="color:#f43f5e">Game over</h2><p id="gos"></p><button class="btn" id="again" style="margin-top:6px">Retry</button></div></div>
</div>
<script>
(function(){
var cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=440,H=640;
var scEl=document.getElementById('sc'),bsEl=document.getElementById('bs'),stEl=document.getElementById('st'),goEl=document.getElementById('go'),gosEl=document.getElementById('gos');
var best=+localStorage.getItem('arcadiaHelixBest')||0;bsEl.textContent=best;
var CX=W/2,CY=H/2,RR=120; // ring radius
var ball,rings,score,running,dead,rot,vy,passed;
function makeRing(y){
  // 8 segments; some are gaps (safe) some are danger
  var segs=[];var n=8;var gapStart=Math.floor(Math.random()*n);
  for(var i=0;i<n;i++){var t='safe';if(i===gapStart||i===(gapStart+1)%n)t='gap';else if(Math.random()<0.4)t='danger';segs.push(t);}
  return {y:y,segs:segs};
}
function reset(){
  ball={y:CY-200,vy:0,r:12};rings=[];score=0;running=true;dead=false;rot=0;vy=0;passed=0;
  for(var i=0;i<30;i++)rings.push(makeRing(CY-120+i*90));
  stEl.classList.add('hide');goEl.classList.add('hide');
}
function upd(){
  if(!running)return;
  ball.vy+=0.45;ball.y+=ball.vy;
  // rings: when ball passes, check segment under ball (top of ring)
  rings.forEach(function(r){
    if(ball.y+ball.r>r.y && ball.y+ball.r<r.y+14 && ball.vy>0){
      // which segment? ball is at angle 0 (front center). ring rotated by rot.
      var segAng=( (0-rot)/(Math.PI*2) ) ; segAng=segAng-Math.floor(segAng);segAng=(segAng*8)%8;var si=Math.floor(segAng);
      var t=r.segs[si];
      if(t==='gap'){/* pass through */ r._hit=true;}
      else if(t==='danger'){die();return;}
      else{ // safe: bounce
        ball.y=r.y-ball.r;ball.vy=-Math.abs(ball.vy)*0.7-3;
      }
    }
  });
  // remove passed rings, score, add new
  rings=rings.filter(function(r){if(r.y<ball.y-200){if(!r._hit){score++;scEl.textContent=score;}return false;}return true;});
  while(rings.length<30)rings.push(makeRing(rings[rings.length-1].y+90));
  // camera follows: shift everything so ball stays around CY
  var shift=ball.y-CY;
  if(Math.abs(shift)>2){ball.y-=shift;rings.forEach(function(r){r.y-=shift;});}
}
function die(){dead=true;running=false;if(score>best){best=score;localStorage.setItem('arcadiaHelixBest',best);}bsEl.textContent=best;gosEl.textContent='Score: '+score;goEl.classList.remove('hide');}
function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0A0A12';ctx.fillRect(0,0,W,H);
  // center pole
  ctx.fillStyle='#1c1c33';ctx.fillRect(CX-3,0,6,H);
  // ball
  ctx.fillStyle='#22D3EE';ctx.shadowColor='#22D3EE';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(CX,ball.y,ball.r,0,7);ctx.fill();ctx.shadowBlur=0;
  // rings (draw as ellipse arcs)
  rings.forEach(function(r){
    var n=8;for(var i=0;i<n;i++){var t=r.segs[i];if(t==='gap')continue;
      var a0=i/n*Math.PI*2+rot, a1=(i+1)/n*Math.PI*2+rot;
      ctx.lineWidth=14;
      if(t==='danger'){ctx.strokeStyle='#f43f5e';ctx.shadowColor='#f43f5e';ctx.shadowBlur=6;}
      else{ctx.strokeStyle='#7C3AED';ctx.shadowColor='#7C3AED';ctx.shadowBlur=4;}
      ctx.beginPath();ctx.ellipse(CX,r.y,RR,RR*0.32,0,a0,a1);ctx.stroke();
    }ctx.shadowBlur=0;
  });
  // ball on top of rings again (so it's visible over ring front edge)
  ctx.fillStyle='#22D3EE';ctx.shadowColor='#22D3EE';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(CX,ball.y,ball.r,0,7);ctx.fill();ctx.shadowBlur=0;
}
function loop(){if(running)upd();draw();requestAnimationFrame(loop);}
window.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')rot-=0.15;if(e.key==='ArrowRight')rot+=0.15;});
var dx;cv.addEventListener('mousedown',function(e){dx=e.clientX;});cv.addEventListener('mousemove',function(e){if(dx!==undefined){rot+=(e.clientX-dx)*0.01;dx=e.clientX;}});
cv.addEventListener('mouseup',function(){dx=undefined;});
cv.addEventListener('touchstart',function(e){e.preventDefault();dx=e.touches[0].clientX;},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();if(dx!==undefined){rot+=(e.touches[0].clientX-dx)*0.01;dx=e.touches[0].clientX;}},{passive:false});
cv.addEventListener('touchend',function(){dx=undefined;});
document.getElementById('start').onclick=reset;
document.getElementById('again').onclick=reset;
reset();running=false;
loop();
})();
</script>
</body>
</html>
