<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Pac-Man — Arcadia</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:Inter,system-ui,sans-serif;background:#0A0A12;color:#ECECF5;overflow:hidden;display:flex;align-items:center;justify-content:center}
  #wrap{position:relative;width:100%;max-width:560px;margin:auto}
  canvas{width:100%;height:auto;display:block;background:#0A0A12;border-radius:14px;border:1px solid rgba(255,255,255,.08)}
  .hud{position:absolute;top:10px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}
  .hud .s{background:rgba(10,10,18,.7);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:5px 11px;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;backdrop-filter:blur(6px)}
  .hud .s span{color:#9a9ab5;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-right:5px}
  .ov{position:absolute;inset:0;display:grid;place-items:center;background:rgba(10,10,18,.82);backdrop-filter:blur(4px);border-radius:14px;text-align:center}
  .ov.hide{display:none}
  .ov h2{font-family:Syne,sans-serif;font-size:26px;margin-bottom:6px}
  .ov p{color:#9a9ab5;margin-bottom:14px;font-size:13px}
  .btn{padding:11px 20px;border-radius:10px;background:linear-gradient(90deg,#7C3AED,#9333ea);color:#fff;font-weight:600;border:none;cursor:pointer;font-size:14px}
  .btn:hover{filter:brightness(1.1)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="456" height="504"></canvas>
  <div class="hud"><div class="s"><span>Score</span><b id="sc">0</b></div><div class="s"><span>Lives</span><b id="lf">3</b></div></div>
  <div class="ov" id="st"><div><h2>Pac-Man</h2><p>Eat all the dots. Avoid the ghosts. Grab a pellet to fight back.</p><p style="margin-bottom:12px;font-size:12px">Arrow keys / WASD / swipe</p><button class="btn" id="start">Start</button></div></div>
  <div class="ov hide" id="go"><div><h2 id="got">Game over</h2><p id="gos"></p><button class="btn" id="again" style="margin-top:6px">Retry</button></div></div>
</div>
<script>
(function(){
var cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=456,H=504;
var scEl=document.getElementById('sc'),lfEl=document.getElementById('lf'),stEl=document.getElementById('st'),goEl=document.getElementById('go'),gotEl=document.getElementById('got'),gosEl=document.getElementById('gos');
var CELL=24,COLS=19,ROWS=21;
// 0=empty,1=wall,2=dot,3=power,4=ghost-house
var MAP=[
"1111111111111111111","1222222222222222221","1211112112112111121","1211112112112111121","1222222222222222221","1211211211121121121","1212112112112112121","1222212222222122221","1111212111121121111","1111212111121121111","1222222000002222221","1111212111121121111","1111212111121121111","1222212222222122221","1212112112112112121","1211211211121121121","1222222222222222221","1211112112112111121","1211112112112111121","1222222222222222221","1111111111111111111"
].map(function(r){return r.split('').map(Number);});
var player,ghosts,score,running,dead,lives,powerT,dotsLeft,dir,nextDir;
function reset(full){
  if(full){score=0;lives=3;}
  player={x:9,y:15,px:9*CELL+CELL/2,py:15*CELL+CELL/2};dir={x:0,y:0};nextDir={x:0,y:0};
  ghosts=[{x:9,y:9,px:9*CELL+CELL/2,py:9*CELL+CELL/2,c:'#f43f5e',dir:1},{x:8,y:9,px:8*CELL+CELL/2,py:9*CELL+CELL/2,c:'#F59E0B',dir:3},{x:10,y:9,px:10*CELL+CELL/2,py:9*CELL+CELL/2,c:'#22D3EE',dir:2}];
  powerT=0;running=true;dead=false;
  if(full){
    // place dots from map
    dotsLeft=0;
  }
  stEl.classList.add('hide');goEl.classList.add('hide');
}
function initMap(){
  // count dots
  dotsLeft=0;
  for(var y=0;y<ROWS;y++)for(var x=0;x<COLS;x++){if(MAP[y][x]===2||MAP[y][x]===3)dotsLeft++;}
}
function isWall(x,y){if(x<0||x>=COLS||y<0||y>=ROWS)return true;return MAP[y][x]===1||MAP[y][x]===4;}
function canMove(x,y,dx,dy){var nx=x+dx,ny=y+dy;if(nx<0)nx=COLS-1;if(nx>=COLS)nx=0;return !isWall(nx,ny);}
function moveEntity(e,spd){
  // grid-based: at cell center, pick direction
  var cx=Math.floor(e.px/CELL),cy=Math.floor(e.py/CELL);
  var centered=Math.abs(e.px-(cx*CELL+CELL/2))<spd && Math.abs(e.py-(cy*CELL+CELL/2))<spd;
  if(centered){e.px=cx*CELL+CELL/2;e.py=cy*CELL+CELL/2;e.x=cx;e.y=cy;return true;}
  return false;
}
function upd(){
  if(!running)return;
  var spd=2;
  // player: at center, apply nextDir if possible
  var pcx=Math.floor(player.px/CELL),pcy=Math.floor(player.py/CELL);
  if(Math.abs(player.px-(pcx*CELL+CELL/2))<spd&&Math.abs(player.py-(pcy*CELL+CELL/2))<spd){
    player.px=pcx*CELL+CELL/2;player.py=pcy*CELL+CELL/2;player.x=pcx;player.y=pcy;
    if(nextDir.x||nextDir.y){if(canMove(pcx,pcy,nextDir.x,nextDir.y))dir={x:nextDir.x,y:nextDir.y};}
    if(!canMove(pcx,pcy,dir.x,dir.y))dir={x:0,y:0};
    // eat
    if(MAP[pcy][pcx]===2){MAP[pcy][pcx]=0;score+=10;dotsLeft--;scEl.textContent=score;}
    else if(MAP[pcy][pcx]===3){MAP[pcy][pcx]=0;score+=50;powerT=360;dotsLeft--;scEl.textContent=score;}
    if(dotsLeft<=0)win();
  }
  // tunnel
  if(player.px<0)player.px=W;else if(player.px>W)player.px=0;
  player.px+=dir.x*spd;player.py+=dir.y*spd;
  if(powerT>0)powerT--;
  // ghosts
  ghosts.forEach(function(g){
    var gcx=Math.floor(g.px/CELL),gcy=Math.floor(g.py/CELL);
    if(Math.abs(g.px-(gcx*CELL+CELL/2))<spd&&Math.abs(g.py-(gcy*CELL+CELL/2))<spd){
      g.px=gcx*CELL+CELL/2;g.py=gcy*CELL+CELL/2;g.x=gcx;g.y=gcy;
      // choose direction toward player (or away if power)
      var dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
      var best=null,bd=-999;
      dirs.forEach(function(d){if(d.x===-g.lastdx&&d.y===-g.lastdy)return;if(canMove(gcx,gcy,d.x,d.y)){var tx=gcx+d.x,ty=gcy+d.y;var dist=(tx-player.x)+(ty-player.y);if(powerT>0)dist=-dist;if(Math.random()<0.2)dist=Math.random();if(dist>bd){bd=dist;best=d;}});
      if(best)g.dir=best;else{dirs.forEach(function(d){if(canMove(gcx,gcy,d.x,d.y))best=d;});g.dir=best||{x:0,y:0};}
      g.lastdx=g.dir.x;g.lastdy=g.dir.y;
    }
    var gs=powerT>0?1.3:1.9;
    if(g.px<0)g.px=W;else if(g.px>W)g.px=0;
    g.px+=g.dir.x*gs;g.py+=g.dir.y*gs;
    // collision
    if(Math.abs(g.px-player.px)<CELL*0.7&&Math.abs(g.py-player.py)<CELL*0.7){
      if(powerT>0){g.x=9;g.y=9;g.px=9*CELL+CELL/2;g.py=9*CELL+CELL/2;score+=200;scEl.textContent=score;}
      else{loseLife();}
    }
  });
}
function loseLife(){lives--;lfEl.textContent=lives;if(lives<=0){end(false);}else{player={x:9,y:15,px:9*CELL+CELL/2,py:15*CELL+CELL/2};dir={x:0,y:0};nextDir={x:0,y:0};ghosts.forEach(function(g,i){g.x=9;g.y=9;g.px=(9+i-1)*CELL+CELL/2;g.py=9*CELL+CELL/2;});}}
function win(){end(true);}
function end(w){running=false;gotEl.textContent=w?'You win':'Game over';gotEl.style.color=w?'#22D3EE':'#f43f5e';gosEl.textContent='Score: '+score;goEl.classList.remove('hide');}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0A0A12';ctx.fillRect(0,0,W,H);
  // map
  for(var y=0;y<ROWS;y++)for(var x=0;x<COLS;x++){var v=MAP[y][x];
    if(v===1){ctx.fillStyle='#14142a';ctx.fillRect(x*CELL,y*CELL,CELL,CELL);ctx.strokeStyle='rgba(124,58,237,.5)';ctx.lineWidth=1.5;ctx.strokeRect(x*CELL+2,y*CELL+2,CELL-4,CELL-4);}
    else if(v===2){ctx.fillStyle='#22D3EE';ctx.beginPath();ctx.arc(x*CELL+CELL/2,y*CELL+CELL/2,2.5,0,7);ctx.fill();}
    else if(v===3){ctx.fillStyle='#7C3AED';ctx.shadowColor='#7C3AED';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(x*CELL+CELL/2,y*CELL+CELL/2,6,0,7);ctx.fill();ctx.shadowBlur=0;}
  }
  // player
  ctx.fillStyle='#FACC15';ctx.shadowColor='#FACC15';ctx.shadowBlur=10;
  var a=Math.atan2(dir.y,dir.x);if(dir.x===0&&dir.y===0)a=0.2;
  ctx.beginPath();ctx.moveTo(player.px+Math.cos(a)*11,player.py+Math.sin(a)*11);ctx.arc(player.px,player.py,11,a+0.4,a-0.4);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  // ghosts
  ghosts.forEach(function(g){ctx.fillStyle=powerT>0?'rgba(60,60,90,1)':g.c;ctx.shadowColor=g.c;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(g.px,g.py-2,10,Math.PI,0);ctx.lineTo(g.px+10,g.py+10);for(var i=0;i<4;i++){ctx.lineTo(g.px+10-i*5,g.py+10-(i%2?0:4));ctx.lineTo(g.px+10-(i+1)*5,g.py+10);}ctx.lineTo(g.px-10,g.py+10);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.fillRect(g.px-5,g.py-3,4,4);ctx.fillRect(g.px+1,g.py-3,4,4);ctx.fillStyle='#0A0A12';ctx.fillRect(g.px-3,g.py-1,2,2);ctx.fillRect(g.px+3,g.py-1,2,2);});
}
function loop(){if(running)upd();draw();requestAnimationFrame(loop);}
window.addEventListener('keydown',function(e){var k=e.key.toLowerCase();if(k==='arrowup'||k==='w'){nextDir={x:0,y:-1};e.preventDefault();}else if(k==='arrowdown'||k==='s'){nextDir={x:0,y:1};e.preventDefault();}else if(k==='arrowleft'||k==='a'){nextDir={x:-1,y:0};e.preventDefault();}else if(k==='arrowright'||k==='d'){nextDir={x:1,y:0};e.preventDefault();}});
var tsx,tsy;cv.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];tsx=t.clientX;tsy=t.clientY;},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();var t=e.changedTouches[0];var dx=t.clientX-tsx,dy=t.clientY-tsy;if(Math.abs(dx)>Math.abs(dy))nextDir={x:dx>0?1:-1,y:0};else nextDir={x:0,y:dy>0?1:-1};},{passive:false});
document.getElementById('start').onclick=function(){initMap();reset(true);};
document.getElementById('again').onclick=function(){initMap();reset(true);};
initMap();reset(true);running=false;
loop();
})();
</script>
</body>
</html>
