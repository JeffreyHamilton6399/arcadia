<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Snake — Arcadia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0A0A12; color: #e7e7f5;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; overflow: hidden; }
  #wrap { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 12px; }
  header { width: 100%; max-width: 560px; text-align: center; margin-bottom: 8px; }
  h1 { font-size: 22px; letter-spacing: 2px; color: #22D3EE; text-transform: uppercase; font-weight: 700; }
  .sub { font-size: 12px; color: #8a8aa5; margin-top: 4px; }
  #hud { display: flex; gap: 24px; justify-content: center; margin: 8px 0; font-size: 14px; }
  #hud b { color: #22D3EE; }
  #hud span small { color: #8a8aa5; display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  #stage { position: relative; width: min(92vw, 560px); aspect-ratio: 1/1; max-height: 70vh; }
  canvas { width: 100%; height: 100%; display: block; background: #07070F;
    border: 1px solid #1c1c33; border-radius: 8px; image-rendering: pixelated; touch-action: none; }
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; background: rgba(10,10,18,0.86);
    border-radius: 8px; text-align: center; padding: 16px; }
  .overlay h2 { font-size: 28px; color: #7C3AED; letter-spacing: 2px; text-transform: uppercase; }
  .overlay p { color: #cfcfe6; font-size: 13px; max-width: 280px; line-height: 1.5; }
  .overlay .stat { color: #22D3EE; font-size: 14px; }
  .btn { background: #22D3EE; color: #0A0A12; border: none; padding: 10px 22px;
    border-radius: 6px; font-family: inherit; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; text-transform: uppercase; font-size: 13px; }
  .btn:hover { background: #67e8f9; }
  .hidden { display: none !important; }
  #dpad { display: none; margin-top: 10px; grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); gap: 6px; }
  #dpad button { background: #15152b; color: #22D3EE; border: 1px solid #2a2a45;
    border-radius: 8px; font-size: 22px; font-weight: 700; cursor: pointer; user-select: none; }
  #dpad button:active { background: #22D3EE; color: #0A0A12; }
  #up { grid-column: 2; grid-row: 1; } #left { grid-column: 1; grid-row: 2; }
  #right { grid-column: 3; grid-row: 2; } #down { grid-column: 2; grid-row: 3; }
  @media (pointer: coarse) { #dpad { display: grid; } }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>Snake</h1>
    <div class="sub">Arrow keys / WASD / swipe to turn. Eat to grow. Don't bite yourself.</div>
  </header>
  <div id="hud">
    <span><small>Score</small><b id="score">0</b></span>
    <span><small>Best</small><b id="best">0</b></span>
    <span><small>Length</small><b id="len">3</b></span>
  </div>
  <div id="stage">
    <canvas id="cv" width="400" height="400"></canvas>
    <div id="start" class="overlay">
      <h2>Snake</h2>
      <p>Eat the violet food to grow. Speed climbs as you grow longer. Hit a wall or your own tail and it's game over.</p>
      <button class="btn" id="startBtn">Start Game</button>
    </div>
    <div id="over" class="overlay hidden">
      <h2>Game Over</h2>
      <p class="stat">Score: <b id="finalScore">0</b> &nbsp; Best: <b id="finalBest">0</b></p>
      <button class="btn" id="restartBtn">Restart</button>
    </div>
  </div>
  <div id="dpad">
    <button id="up" aria-label="Up">&uarr;</button>
    <button id="left" aria-label="Left">&larr;</button>
    <button id="right" aria-label="Right">&rarr;</button>
    <button id="down" aria-label="Down">&darr;</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var COLS = 20, ROWS = 20;
  var CELL = cv.width / COLS;
  var scoreEl = document.getElementById('score');
  var bestEl = document.getElementById('best');
  var lenEl = document.getElementById('len');
  var startO = document.getElementById('start');
  var overO = document.getElementById('over');
  var startBtn = document.getElementById('startBtn');
  var restartBtn = document.getElementById('restartBtn');
  var finalScoreEl = document.getElementById('finalScore');
  var finalBestEl = document.getElementById('finalBest');

  var BEST_KEY = 'arcadiaSnakeBest';
  var best = 0;
  try { best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch(e){}
  bestEl.textContent = best;

  var snake, dir, nextDir, food, score, alive, running, started;
  var stepMs, acc, last;

  function reset(){
    snake = [{x:8,y:10},{x:7,y:10},{x:6,y:10}];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    placeFood();
    score = 0;
    alive = true;
    stepMs = 140;
    acc = 0;
    last = performance.now();
    scoreEl.textContent = '0';
    lenEl.textContent = '3';
  }

  function placeFood(){
    var occupied = {};
    for (var i=0;i<snake.length;i++) occupied[snake[i].x+','+snake[i].y] = true;
    var pos;
    do {
      pos = {x: (Math.random()*COLS)|0, y: (Math.random()*ROWS)|0};
    } while (occupied[pos.x+','+pos.y]);
    food = pos;
  }

  function setDir(x,y){
    if (!running) return;
    // forbid reversing directly
    if (dir.x === -x && dir.y === -y) return;
    nextDir = {x:x, y:y};
  }

  function step(){
    dir = nextDir;
    var head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
    for (var i=0;i<snake.length-1;i++){
      if (snake[i].x === head.x && snake[i].y === head.y) { die(); return; }
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y){
      score++;
      scoreEl.textContent = score;
      lenEl.textContent = snake.length;
      placeFood();
      // speed up gradually: faster as snake grows, with floor
      stepMs = Math.max(60, 140 - (snake.length - 3) * 3);
    } else {
      snake.pop();
    }
  }

  function die(){
    alive = false;
    running = false;
    if (score > best){
      best = score;
      try { localStorage.setItem(BEST_KEY, String(best)); } catch(e){}
    }
    bestEl.textContent = best;
    finalScoreEl.textContent = score;
    finalBestEl.textContent = best;
    overO.classList.remove('hidden');
  }

  function draw(){
    ctx.fillStyle = '#07070F';
    ctx.fillRect(0,0,cv.width,cv.height);
    // grid
    ctx.strokeStyle = 'rgba(34,211,238,0.05)';
    ctx.lineWidth = 1;
    for (var i=1;i<COLS;i++){
      ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,cv.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(cv.width,i*CELL); ctx.stroke();
    }
    // food
    drawCell(food.x, food.y, '#7C3AED', true);
    // snake
    for (var j=0;j<snake.length;j++){
      var seg = snake[j];
      var head = j === 0;
      drawCell(seg.x, seg.y, head ? '#67e8f9' : '#22D3EE', false);
    }
  }

  function drawCell(cx, cy, color, glow){
    var x = cx*CELL, y = cy*CELL;
    if (glow){
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 14;
    }
    ctx.fillStyle = color;
    var pad = 1;
    ctx.fillRect(x+pad, y+pad, CELL-pad*2, CELL-pad*2);
    if (glow) ctx.restore();
    // inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x+pad, y+pad, CELL-pad*2, 2);
  }

  function loop(now){
    if (!started) return;
    var dt = now - last;
    last = now;
    if (running && alive){
      acc += dt;
      while (acc >= stepMs){
        acc -= stepMs;
        step();
        if (!alive) break;
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  function startGame(){
    reset();
    started = true;
    running = true;
    startO.classList.add('hidden');
    overO.classList.add('hidden');
    last = performance.now();
    requestAnimationFrame(loop);
  }

  // keyboard
  window.addEventListener('keydown', function(e){
    var k = e.key;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') { setDir(0,-1); e.preventDefault(); }
    else if (k === 'ArrowDown' || k === 's' || k === 'S') { setDir(0,1); e.preventDefault(); }
    else if (k === 'ArrowLeft' || k === 'a' || k === 'A') { setDir(-1,0); e.preventDefault(); }
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') { setDir(1,0); e.preventDefault(); }
    else if (k === ' ' || k === 'Enter') {
      if (!running) startGame();
    }
  }, {passive:false});

  // d-pad buttons
  function bind(id, x, y){ document.getElementById(id).addEventListener('click', function(){ setDir(x,y); }); }
  bind('up',0,-1); bind('down',0,1); bind('left',-1,0); bind('right',1,0);

  // swipe
  var touchStart = null;
  cv.addEventListener('touchstart', function(e){
    if (e.touches.length === 1){ touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY}; }
  }, {passive:true});
  cv.addEventListener('touchmove', function(e){ e.preventDefault(); }, {passive:false});
  cv.addEventListener('touchend', function(e){
    if (!touchStart) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStart.x;
    var dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18){
      // treat as tap to start
      if (!running) startGame();
      touchStart = null; return;
    }
    if (Math.abs(dx) > Math.abs(dy)){
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  }, {passive:true});

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // initial paint
  reset();
  started = false;
  draw();
})();
</script>
</body>
</html>
