<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Aim Trainer &middot; Arcadia</title>
<style>
  :root {
    --bg: #0A0A12;
    --panel: #14141f;
    --panel-2: #1b1b2b;
    --text: #E5E7EB;
    --muted: #8b8ba0;
    --border: #2a2a3c;
    --accent: #22D3EE;
    --target: #22D3EE;
    --miss: #b8323a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 50% 0%, #16162a 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 14px 26px;
    min-height: 100%;
    user-select: none;
  }
  h1 { font-size: clamp(22px, 6vw, 30px); letter-spacing: 1px; margin-bottom: 4px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 12px; text-align: center; }
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    width: 100%; max-width: 560px; margin-bottom: 12px;
  }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 8px 4px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 20px; font-weight: 700; margin-top: 2px; color: var(--accent); }
  .stat-card.time .stat-value { color: #f59e0b; }
  .arena {
    position: relative;
    width: 100%;
    max-width: 560px;
    height: 60vh;
    min-height: 320px;
    background:
      linear-gradient(rgba(34,211,238,0.04) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, rgba(34,211,238,0.04) 1px, transparent 1px) 0 0 / 40px 40px,
      var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: crosshair;
  }
  .arena.idle { cursor: default; }
  .target {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #a8f6ff 0%, var(--target) 55%, #0d6d80 100%);
    box-shadow: 0 0 14px rgba(34,211,238,0.55), inset 0 0 8px rgba(255,255,255,0.25);
    cursor: pointer;
    transform: translate(-50%, -50%);
    animation: targetIn 0.12s ease-out;
  }
  @keyframes targetIn {
    from { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  .target::after {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.55);
  }
  .target::before {
    content: "";
    position: absolute;
    inset: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
  }
  .miss-mark {
    position: absolute;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--miss);
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0.55;
    animation: missFade 0.4s ease-out forwards;
  }
  @keyframes missFade {
    from { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
    to { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
  }
  .hit-pop {
    position: absolute;
    color: var(--target);
    font-weight: 800;
    font-size: 16px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    animation: hitPop 0.5s ease-out forwards;
  }
  @keyframes hitPop {
    from { transform: translate(-50%, -50%); opacity: 1; }
    to { transform: translate(-50%, -100%); opacity: 0; }
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--muted);
    text-align: center;
    pointer-events: none;
    padding: 20px;
  }
  .overlay h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
  .overlay p { font-size: 13px; max-width: 280px; line-height: 1.5; }
  .controls { margin-top: 12px; display: flex; gap: 10px; }
  button.btn {
    background: var(--accent); color: #06121a; border: none; border-radius: 10px;
    padding: 11px 22px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .5px;
    transition: filter .15s ease, transform .08s ease;
  }
  button.btn:hover { filter: brightness(1.1); }
  button.btn:active { transform: scale(0.97); }
  button.btn:disabled { opacity: .5; cursor: not-allowed; }
  button.btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button.btn.ghost:hover { background: var(--panel); }
  .result-row { margin-top: 10px; font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
  footer { margin-top: auto; padding-top: 14px; font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
  <h1>AIM TRAINER</h1>
  <p class="subtitle">Click targets as fast as you can. 30 second round.</p>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">Hits</div><div class="stat-value" id="hits">0</div></div>
    <div class="stat-card"><div class="stat-label">Misses</div><div class="stat-value" id="misses">0</div></div>
    <div class="stat-card"><div class="stat-label">Avg ms</div><div class="stat-value" id="avg">0</div></div>
    <div class="stat-card time"><div class="stat-label">Time</div><div class="stat-value" id="time">30</div></div>
  </div>

  <div class="arena idle" id="arena">
    <div class="overlay" id="overlay">
      <h2>Ready?</h2>
      <p>Click the cyan targets as fast as you can. Clicks outside count as misses.</p>
    </div>
  </div>

  <div class="result-row" id="result"></div>

  <div class="controls">
    <button class="btn" id="startBtn">Start</button>
    <button class="btn ghost" id="resetBestBtn">Reset Best</button>
  </div>

  <div class="stats" style="margin-top: 10px; grid-template-columns: 1fr 1fr;">
    <div class="stat-card"><div class="stat-label">Best Hits</div><div class="stat-value" id="bestHits">0</div></div>
    <div class="stat-card"><div class="stat-label">Best Acc</div><div class="stat-value" id="bestAcc">0%</div></div>
  </div>

  <footer>Arcadia &middot; Aim Trainer</footer>

<script>
(function () {
  "use strict";
  var ROUND_TIME = 30; // seconds
  var TARGET_SIZE = 40;
  var BEST_HITS_KEY = "arcadia_aim_best_hits";
  var BEST_ACC_KEY = "arcadia_aim_best_acc";

  var arena, overlay, hitsEl, missesEl, avgEl, timeEl, bestHitsEl, bestAccEl, resultEl, startBtn, resetBestBtn;
  var running = false;
  var hits = 0;
  var misses = 0;
  var reactionTimes = [];
  var lastSpawnAt = 0;
  var roundStart = 0;
  var timeLeft = ROUND_TIME;
  var countdownTimer = null;
  var currentTarget = null;
  var bestHits = 0;
  var bestAcc = 0;

  function loadBest() {
    try {
      bestHits = parseInt(localStorage.getItem(BEST_HITS_KEY) || "0", 10) || 0;
      bestAcc = parseFloat(localStorage.getItem(BEST_ACC_KEY) || "0") || 0;
    } catch (e) { bestHits = 0; bestAcc = 0; }
  }
  function saveBest() {
    try {
      localStorage.setItem(BEST_HITS_KEY, String(bestHits));
      localStorage.setItem(BEST_ACC_KEY, String(bestAcc));
    } catch (e) {}
  }

  function clearTargets() {
    var t = arena.querySelectorAll(".target, .miss-mark, .hit-pop");
    for (var i = 0; i < t.length; i++) t[i].parentNode.removeChild(t[i]);
    currentTarget = null;
  }

  function spawnTarget() {
    var rect = arena.getBoundingClientRect();
    var padding = TARGET_SIZE / 2 + 6;
    var x = padding + Math.random() * (rect.width - padding * 2);
    var y = padding + Math.random() * (rect.height - padding * 2);
    var target = document.createElement("div");
    target.className = "target";
    target.style.left = x + "px";
    target.style.top = y + "px";
    target.addEventListener("click", onTargetHit);
    target.addEventListener("touchstart", onTargetHit, { passive: false });
    arena.appendChild(target);
    currentTarget = target;
    lastSpawnAt = performance.now();
  }

  function onTargetHit(e) {
    if (!running) return;
    if (e.preventDefault) e.preventDefault();
    e.stopPropagation();
    hits++;
    var rt = performance.now() - lastSpawnAt;
    reactionTimes.push(rt);
    hitsEl.textContent = hits;
    updateAvg();
    // Visual pop
    var rect = e.currentTarget.getBoundingClientRect();
    var arenaRect = arena.getBoundingClientRect();
    var pop = document.createElement("div");
    pop.className = "hit-pop";
    pop.textContent = "+" + Math.round(rt) + "ms";
    pop.style.left = (rect.left - arenaRect.left + rect.width / 2) + "px";
    pop.style.top = (rect.top - arenaRect.top + rect.height / 2) + "px";
    arena.appendChild(pop);
    setTimeout(function () { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 500);
    // Remove target & spawn next
    if (e.currentTarget && e.currentTarget.parentNode) e.currentTarget.parentNode.removeChild(e.currentTarget);
    currentTarget = null;
    spawnTarget();
  }

  function onArenaClick(e) {
    if (!running) return;
    if (e.target.classList && e.target.classList.contains("target")) return;
    misses++;
    missesEl.textContent = misses;
    var arenaRect = arena.getBoundingClientRect();
    var mark = document.createElement("div");
    mark.className = "miss-mark";
    mark.style.left = (e.clientX - arenaRect.left) + "px";
    mark.style.top = (e.clientY - arenaRect.top) + "px";
    arena.appendChild(mark);
    setTimeout(function () { if (mark.parentNode) mark.parentNode.removeChild(mark); }, 400);
  }

  function updateAvg() {
    if (!reactionTimes.length) { avgEl.textContent = "0"; return; }
    var sum = 0;
    for (var i = 0; i < reactionTimes.length; i++) sum += reactionTimes[i];
    avgEl.textContent = Math.round(sum / reactionTimes.length);
  }

  function accuracy() {
    var total = hits + misses;
    if (!total) return 0;
    return Math.round((hits / total) * 100);
  }

  function tick() {
    if (!running) return;
    var elapsed = (Date.now() - roundStart) / 1000;
    timeLeft = ROUND_TIME - elapsed;
    timeEl.textContent = Math.max(0, Math.ceil(timeLeft));
    if (timeLeft <= 0) endRound();
  }

  function startGame() {
    if (running) return;
    running = true;
    hits = 0;
    misses = 0;
    reactionTimes = [];
    timeLeft = ROUND_TIME;
    hitsEl.textContent = "0";
    missesEl.textContent = "0";
    avgEl.textContent = "0";
    timeEl.textContent = String(ROUND_TIME);
    resultEl.textContent = "";
    overlay.style.display = "none";
    arena.classList.remove("idle");
    startBtn.disabled = true;
    startBtn.textContent = "Playing";
    roundStart = Date.now();
    countdownTimer = setInterval(tick, 100);
    spawnTarget();
  }

  function endRound() {
    running = false;
    if (countdownTimer) clearInterval(countdownTimer);
    clearTargets();
    arena.classList.add("idle");
    startBtn.disabled = false;
    startBtn.textContent = "Restart";
    var acc = accuracy();
    var avg = reactionTimes.length ? Math.round(reactionTimes.reduce(function(a,b){return a+b;},0) / reactionTimes.length) : 0;
    resultEl.textContent = "Round over — " + hits + " hits, " + misses + " misses, " + acc + "% accuracy, " + avg + " ms avg.";
    var newBest = false;
    if (hits > bestHits) { bestHits = hits; newBest = true; }
    if (acc > bestAcc) { bestAcc = acc; newBest = true; }
    if (newBest) saveBest();
    bestHitsEl.textContent = bestHits;
    bestAccEl.textContent = bestAcc + "%";
    overlay.querySelector("h2").textContent = "Round Over";
    overlay.querySelector("p").textContent = hits + " hits / " + misses + " misses (" + acc + "%). Press Restart to play again.";
    overlay.style.display = "flex";
  }

  function resetBest() {
    bestHits = 0;
    bestAcc = 0;
    bestHitsEl.textContent = "0";
    bestAccEl.textContent = "0%";
    saveBest();
  }

  function init() {
    arena = document.getElementById("arena");
    overlay = document.getElementById("overlay");
    hitsEl = document.getElementById("hits");
    missesEl = document.getElementById("misses");
    avgEl = document.getElementById("avg");
    timeEl = document.getElementById("time");
    bestHitsEl = document.getElementById("bestHits");
    bestAccEl = document.getElementById("bestAcc");
    resultEl = document.getElementById("result");
    startBtn = document.getElementById("startBtn");
    resetBestBtn = document.getElementById("resetBestBtn");
    arena.addEventListener("click", onArenaClick);
    startBtn.addEventListener("click", startGame);
    resetBestBtn.addEventListener("click", resetBest);
    loadBest();
    bestHitsEl.textContent = bestHits;
    bestAccEl.textContent = bestAcc + "%";
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
