<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sudoku - Arcadia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0A0A12; color: #E5E7EB;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100%; padding: 14px;
    -webkit-tap-highlight-color: transparent; overflow-x: hidden;
  }
  .game { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }
  .header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  h1 {
    font-size: 30px; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(90deg, #22D3EE, #7C3AED);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .btns { display: flex; gap: 8px; }
  button {
    background: #14141f; color: #E5E7EB;
    border: 1px solid rgba(34,211,238,0.35); border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: transform 0.1s, background 0.1s; font-family: inherit;
  }
  button:hover { background: #1c1c2c; }
  button:active { transform: scale(0.96); }
  button.primary {
    background: linear-gradient(90deg, #22D3EE, #7C3AED); color: #0A0A12; border: none;
  }
  .hint { font-size: 12.5px; color: #8B8BA0; line-height: 1.4; }
  .board-wrap { display: flex; justify-content: center; }
  .board {
    --size: min(440px, calc(100vw - 28px));
    width: var(--size); height: var(--size);
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    gap: 3px; background: #2a2a3a; padding: 3px; border-radius: 8px;
    border: 1px solid rgba(34,211,238,0.3); position: relative;
    user-select: none; touch-action: manipulation;
  }
  .box {
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    gap: 1px; background: #1c1c2c;
  }
  .cell {
    background: #14141f; display: flex; align-items: center; justify-content: center;
    font-size: calc(var(--size) / 12); font-weight: 700; color: #E5E7EB;
    cursor: pointer; transition: background 0.1s; position: relative;
  }
  .cell.given { color: #67E8F9; background: #181826; cursor: default; }
  .cell.selected { background: rgba(34,211,238,0.18) !important; }
  .cell.peer { background: rgba(255,255,255,0.04); }
  .cell.same { background: rgba(34,211,238,0.1) !important; }
  .cell.conflict { color: #F87171 !important; }
  .cell.user { color: #fff; }
  .cell.given.conflict { color: #F87171 !important; }
  .pad-wrap { display: flex; justify-content: center; }
  .pad {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    width: 100%; max-width: 440px;
  }
  .pad button {
    padding: 12px 0; font-size: 18px; font-weight: 700; text-align: center;
    background: #14141f; color: #E5E7EB; border: 1px solid rgba(34,211,238,0.3);
  }
  .pad button:hover { background: #1c1c2c; }
  .pad button.clear { color: #F87171; border-color: rgba(248,113,113,0.35); }
  .message {
    text-align: center; min-height: 22px; font-size: 14px; font-weight: 600;
    color: #67E8F9;
  }
  .message.err { color: #F87171; }
  .message.win { color: #A7F3D0; }
  .overlay {
    position: fixed; inset: 0; background: rgba(10,10,18,0.8);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .overlay.show { display: flex; }
  .overlay-card {
    background: #14141f; border: 1px solid rgba(34,211,238,0.4);
    border-radius: 12px; padding: 28px; text-align: center; max-width: 320px;
  }
  .overlay-card h2 {
    font-size: 26px; margin-bottom: 8px;
    background: linear-gradient(90deg, #22D3EE, #7C3AED);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .overlay-card p { color: #B5B5C8; margin-bottom: 18px; font-size: 14px; }
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <h1>Sudoku</h1>
    <div class="btns">
      <button id="check">Check</button>
      <button id="new" class="primary">New puzzle</button>
    </div>
  </div>
  <p class="hint">Fill 1-9 so each row, column and 3x3 box has every digit once. Click a cell then a number, or type.</p>
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
  <div class="message" id="message"></div>
  <div class="pad-wrap">
    <div class="pad" id="pad"></div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <h2>Solved!</h2>
    <p id="win-text">Well done.</p>
    <button id="overlay-new" class="primary">New puzzle</button>
  </div>
</div>
<script>
(function () {
  var board = document.getElementById('board');
  var pad = document.getElementById('pad');
  var message = document.getElementById('message');
  var checkBtn = document.getElementById('check');
  var newBtn = document.getElementById('new');
  var overlay = document.getElementById('overlay');
  var overlayNew = document.getElementById('overlay-new');
  var winText = document.getElementById('win-text');

  var solution = [];   // 9x9 solved
  var puzzle = [];     // 9x9 with 0 for empty (clues)
  var user = [];       // 9x9 user values (0 for empty)
  var given = [];      // 9x9 booleans
  var cells = [];      // 9x9 cell elements
  var selR = -1, selC = -1;

  function shuffleArr(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function generateSolved() {
    var base = 3, side = 9;
    function pattern(r, c) { return (base * (r % base) + Math.floor(r / base) + c) % side; }
    var rRows = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    var rCols = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    var bands = [0, 1, 2], stacks = [0, 1, 2];
    bands = shuffleArr(bands);
    stacks = shuffleArr(stacks);
    var rows = [];
    for (var b = 0; b < 3; b++) {
      var inner = shuffleArr([0, 1, 2]);
      for (var k = 0; k < 3; k++) rows.push(bands[b] * 3 + inner[k]);
    }
    var cols = [];
    for (var s = 0; s < 3; s++) {
      var innerC = shuffleArr([0, 1, 2]);
      for (var k = 0; k < 3; k++) cols.push(stacks[s] * 3 + innerC[k]);
    }
    var labels = shuffleArr([1, 2, 3, 4, 5, 6, 7, 8, 9]);
    var g = [];
    for (var r = 0; r < 9; r++) {
      var row = [];
      for (var c = 0; c < 9; c++) {
        row.push(labels[pattern(rows[r], cols[c])]);
      }
      g.push(row);
    }
    return g;
  }

  function makePuzzle(solved, removeCount) {
    var p = solved.map(function (row) { return row.slice(); });
    var positions = [];
    for (var i = 0; i < 81; i++) positions.push(i);
    shuffleArr(positions);
    var removed = 0;
    for (var idx = 0; idx < positions.length && removed < removeCount; idx++) {
      var pos = positions[idx];
      var r = Math.floor(pos / 9), c = pos % 9;
      if (p[r][c] !== 0) { p[r][c] = 0; removed++; }
    }
    return p;
  }

  function buildBoardDOM() {
    board.innerHTML = '';
    cells = [];
    var boxes = [];
    for (var bi = 0; bi < 9; bi++) {
      var box = document.createElement('div');
      box.className = 'box';
      board.appendChild(box);
      boxes.push(box);
    }
    for (var r = 0; r < 9; r++) {
      cells[r] = [];
      for (var c = 0; c < 9; c++) {
        var bi2 = Math.floor(r / 3) * 3 + Math.floor(c / 3);
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.setAttribute('data-r', r);
        cell.setAttribute('data-c', c);
        (function (rr, cc) {
          cell.addEventListener('click', function () { selectCell(rr, cc); });
        })(r, c);
        boxes[bi2].appendChild(cell);
        cells[r][c] = cell;
      }
    }
  }

  function buildPad() {
    pad.innerHTML = '';
    for (var n = 1; n <= 9; n++) {
      (function (num) {
        var b = document.createElement('button');
        b.textContent = num;
        b.addEventListener('click', function () { enterNumber(num); });
        pad.appendChild(b);
      })(n);
    }
    var clr = document.createElement('button');
    clr.textContent = 'Clear';
    clr.className = 'clear';
    clr.addEventListener('click', function () { enterNumber(0); });
    pad.appendChild(clr);
  }

  function selectCell(r, c) {
    selR = r; selC = c;
    renderHighlights();
  }

  function enterNumber(n) {
    if (selR < 0) { setMessage('Select a cell first.', 'err'); return; }
    if (given[selR][selC]) return;
    user[selR][selC] = n;
    renderValues();
    renderHighlights();
    setMessage('', '');
    if (isComplete() && !hasConflicts()) {
      win();
    }
  }

  function setMessage(text, kind) {
    message.textContent = text;
    message.className = 'message' + (kind ? ' ' + kind : '');
  }

  function renderValues() {
    for (var r = 0; r < 9; r++) {
      for (var c = 0; c < 9; c++) {
        var cell = cells[r][c];
        var v = user[r][c];
        cell.textContent = v === 0 ? '' : v;
        cell.classList.toggle('given', given[r][c]);
        cell.classList.toggle('user', !given[r][c] && v !== 0);
      }
    }
  }

  function computeConflicts() {
    // returns set of "r,c" strings for conflicting cells
    var conflicts = {};
    function note(r, c) { conflicts[r + ',' + c] = true; }
    // rows
    for (var r = 0; r < 9; r++) {
      var seen = {};
      for (var c = 0; c < 9; c++) {
        var v = user[r][c];
        if (v === 0) continue;
        if (seen[v] !== undefined) { note(r, c); note(r, seen[v]); }
        else seen[v] = c;
      }
    }
    // cols
    for (var c = 0; c < 9; c++) {
      var seenC = {};
      for (var r2 = 0; r2 < 9; r2++) {
        var v2 = user[r2][c];
        if (v2 === 0) continue;
        if (seenC[v2] !== undefined) { note(r2, c); note(seenC[v2], c); }
        else seenC[v2] = r2;
      }
    }
    // boxes
    for (var br = 0; br < 3; br++) for (var bc = 0; bc < 3; bc++) {
      var seenB = {};
      for (var i = 0; i < 9; i++) {
        var rr = br * 3 + Math.floor(i / 3), cc = bc * 3 + (i % 3);
        var v3 = user[rr][cc];
        if (v3 === 0) continue;
        if (seenB[v3] !== undefined) { var p = seenB[v3]; note(rr, cc); note(p[0], p[1]); }
        else seenB[v3] = [rr, cc];
      }
    }
    return conflicts;
  }

  function renderHighlights() {
    var conflicts = computeConflicts();
    var selVal = (selR >= 0 && user[selR][selC]) ? user[selR][selC] : 0;
    for (var r = 0; r < 9; r++) {
      for (var c = 0; c < 9; c++) {
        var cell = cells[r][c];
        cell.classList.remove('selected', 'peer', 'same', 'conflict');
        if (conflicts[r + ',' + c]) cell.classList.add('conflict');
        if (selR >= 0) {
          if (r === selR && c === selC) cell.classList.add('selected');
          else if (r === selR || c === selC || (Math.floor(r / 3) === Math.floor(selR / 3) && Math.floor(c / 3) === Math.floor(selC / 3))) cell.classList.add('peer');
          if (selVal && user[r][c] === selVal && !(r === selR && c === selC)) cell.classList.add('same');
        }
      }
    }
  }

  function isComplete() {
    for (var r = 0; r < 9; r++) for (var c = 0; c < 9; c++) if (user[r][c] === 0) return false;
    return true;
  }

  function hasConflicts() {
    var k = computeConflicts();
    for (var key in k) return true;
    return false;
  }

  function check() {
    if (!isComplete()) { setMessage('Board not complete yet.', 'err'); return; }
    if (hasConflicts()) { setMessage('Conflicts found. Keep trying.', 'err'); return; }
    win();
  }

  function win() {
    setMessage('Solved correctly!', 'win');
    winText.textContent = 'You completed the puzzle.';
    overlay.classList.add('show');
  }

  function newPuzzle() {
    solution = generateSolved();
    puzzle = makePuzzle(solution, 37);
    user = puzzle.map(function (row) { return row.slice(); });
    given = puzzle.map(function (row) { return row.map(function (v) { return v !== 0; }); });
    selR = -1; selC = -1;
    setMessage('', '');
    overlay.classList.remove('show');
    renderValues();
    renderHighlights();
  }

  // keyboard
  window.addEventListener('keydown', function (e) {
    if (e.key >= '1' && e.key <= '9') { e.preventDefault(); enterNumber(parseInt(e.key, 10)); return; }
    if (e.key === '0' || e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); enterNumber(0); return; }
    if (selR >= 0) {
      var nr = selR, nc = selC;
      if (e.key === 'ArrowUp') nr = Math.max(0, selR - 1);
      else if (e.key === 'ArrowDown') nr = Math.min(8, selR + 1);
      else if (e.key === 'ArrowLeft') nc = Math.max(0, selC - 1);
      else if (e.key === 'ArrowRight') nc = Math.min(8, selC + 1);
      else return;
      e.preventDefault();
      selectCell(nr, nc);
    }
  });

  checkBtn.addEventListener('click', check);
  newBtn.addEventListener('click', newPuzzle);
  overlayNew.addEventListener('click', newPuzzle);

  buildBoardDOM();
  buildPad();
  newPuzzle();
})();
</script>
</body>
</html>
