<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tetris — Arcadia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0A0A12; color: #e7e7f5;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; overflow: hidden; }
  #wrap { width: 100%; height: 100%; display: flex; flex-direction: column;
    align-items: center; padding: 10px; }
  header { text-align: center; }
  h1 { font-size: 22px; letter-spacing: 3px; color: #22D3EE; text-transform: uppercase; font-weight: 700; }
  .sub { font-size: 11px; color: #8a8aa5; margin-top: 3px; }
  #main { display: flex; gap: 14px; margin-top: 10px; align-items: flex-start; }
  #stage { position: relative; }
  canvas { background: #07070F; border: 1px solid #1c1c33; border-radius: 6px; display: block; touch-action: none; }
  #board { width: min(56vw, 300px); height: min(112vw, 600px); }
  #next { width: 96px; height: 96px; }
  #side { display: flex; flex-direction: column; gap: 10px; }
  .panel { background: #12121f; border: 1px solid #1c1c33; border-radius: 6px; padding: 10px; min-width: 96px; }
  .panel h3 { font-size: 10px; letter-spacing: 1.5px; color: #8a8aa5; text-transform: uppercase; margin-bottom: 4px; }
  .panel .v { font-size: 20px; color: #22D3EE; font-weight: 700; }
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; background: rgba(10,10,18,0.88);
    border-radius: 6px; text-align: center; padding: 16px; }
  .overlay h2 { font-size: 26px; color: #7C3AED; letter-spacing: 2px; text-transform: uppercase; }
  .overlay p { color: #cfcfe6; font-size: 12px; max-width: 240px; line-height: 1.5; }
  .btn { background: #22D3EE; color: #0A0A12; border: none; padding: 10px 20px;
    border-radius: 6px; font-family: inherit; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; text-transform: uppercase; font-size: 12px; }
  .btn:hover { background: #67e8f9; }
  .btn.sec { background: transparent; color: #22D3EE; border: 1px solid #22D3EE; }
  .hidden { display: none !important;; }
  #controls { display: none; margin-top: 12px; width: 100%; max-width: 360px; gap: 6px; }
  #controls button { background: #15152b; color: #22D3EE; border: 1px solid #2a2a45;
    border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; padding: 12px 0;
    font-family: inherit; user-select: none; }
  #controls button:active { background: #22D3EE; color: #0A0A12; }
  #controls .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  @media (pointer: coarse), (max-width: 640px) { #controls { display: block; } }
  .hint { font-size: 10px; color: #5a5a78; margin-top: 6px; text-align: center; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>Tetris</h1>
    <div class="sub">Arrows move &amp; rotate. Space = hard drop. P = pause.</div>
  </header>
  <div id="main">
    <div id="stage">
      <canvas id="board" width="200" height="400"></canvas>
      <div id="start" class="overlay">
        <h2>Tetris</h2>
        <p>Clear lines to score. Speed climbs every 10 lines. Top out and it's over.</p>
        <button class="btn" id="startBtn">Start Game</button>
      </div>
      <div id="pause" class="overlay hidden">
        <h2>Paused</h2>
        <button class="btn" id="resumeBtn">Resume</button>
      </div>
      <div id="over" class="overlay hidden">
        <h2>Game Over</h2>
        <p>Score: <b id="finalScore">0</b> &nbsp; Lines: <b id="finalLines">0</b> &nbsp; Level: <b id="finalLevel">1</b></p>
        <button class="btn" id="restartBtn">Restart</button>
      </div>
    </div>
    <div id="side">
      <div class="panel"><h3>Score</h3><div class="v" id="score">0</div></div>
      <div class="panel"><h3>Lines</h3><div class="v" id="lines">0</div></div>
      <div class="panel"><h3>Level</h3><div class="v" id="level">1</div></div>
      <div class="panel"><h3>Next</h3><canvas id="next" width="96" height="96"></canvas></div>
      <button class="btn sec" id="pauseBtn" style="margin-top:4px;">Pause</button>
      <button class="btn sec" id="restartBtn2">Restart</button>
    </div>
  </div>
  <div id="controls">
    <div class="row">
      <button data-act="left">&larr;</button>
      <button data-act="rotate">Rotate</button>
      <button data-act="right">&rarr;</button>
    </div>
    <div class="row">
      <button data-act="soft">Soft Drop</button>
      <button data-act="hard">Hard Drop</button>
      <button data-act="pause">Pause</button>
    </div>
  </div>
  <div class="hint">Tip: on desktop use arrows + space.</div>
</div>

<script>
(function(){
  "use strict";
  var COLS = 10, ROWS = 20;
  var cv = document.getElementById('board');
  var ctx = cv.getContext('2d');
  var nextCv = document.getElementById('next');
  var nctx = nextCv.getContext('2d');
  var CELL = cv.width / COLS;        // 20
  var NCELL = nextCv.width / 4;      // 24

  var scoreEl = document.getElementById('score');
  var linesEl = document.getElementById('lines');
  var levelEl = document.getElementById('level');
  var startO = document.getElementById('start');
  var pauseO = document.getElementById('pause');
  var overO = document.getElementById('over');
  var finalScoreEl = document.getElementById('finalScore');
  var finalLinesEl = document.getElementById('finalLines');
  var finalLevelEl = document.getElementById('finalLevel');

  // Piece shapes as 4x4 grids (or 4x4 for S/Z/I/T/L/J; O uses 2x2 inset)
  // Each piece: list of rotation matrices (4x4)
  var COLORS = {
    I: '#22D3EE', O: '#FACC15', T: '#A855F7', S: '#10B981',
    Z: '#F43F5E', J: '#3B82F6', L: '#F97316'
  };

  function rotMat(shape){
    // shape: array of [x,y] cells in 4x4 grid
    var out = shape.map(function(p){ return [p[0], p[1]]; });
    return out;
  }
  function rotate(shape){
    // rotate clockwise around center of 4x4
    return shape.map(function(p){ return [p[1], 3 - p[0]]; });
  }

  // base shapes
  var SHAPES = {
    I: [[0,1],[1,1],[2,1],[3,1]],
    O: [[1,1],[2,1],[1,2],[2,2]],
    T: [[1,0],[0,1],[1,1],[2,1]],
    S: [[1,0],[2,0],[0,1],[1,1]],
    Z: [[0,0],[1,0],[1,1],[2,1]],
    J: [[0,0],[0,1],[1,1],[2,1]],
    L: [[2,0],[0,1],[1,1],[2,1]]
  };
  var KEYS = ['I','O','T','S','Z','J','L'];

  function makeBag(){
    var bag = KEYS.slice();
    for (var i = bag.length-1; i>0; i--){
      var j = (Math.random()*(i+1))|0;
      var t = bag[i]; bag[i] = bag[j]; bag[j] = t;
    }
    return bag;
  }

  var grid, current, nextType, bag, score, lines, level, dropMs, acc, last;
  var running, paused, started, gameOver;

  function reset(){
    grid = [];
    for (var y=0;y<ROWS;y++){
      var row = [];
      for (var x=0;x<COLS;x++) row.push(null);
      grid.push(row);
    }
    bag = makeBag();
    nextType = bag.shift();
    if (bag.length < 2) bag = bag.concat(makeBag());
    score = 0; lines = 0; level = 1; dropMs = 800; acc = 0; last = performance.now();
    running = true; paused = false; gameOver = false;
    spawn();
    updateHud();
  }

  function spawn(){
    var type = nextType;
    nextType = bag.shift();
    if (bag.length < 2) bag = bag.concat(makeBag());
    current = {
      type: type,
      shape: SHAPES[type].map(function(p){ return [p[0], p[1]]; }),
      x: type === 'O' ? 3 : 3,
      y: type === 'I' ? -1 : 0
    };
    if (!canPlace(current.shape, current.x, current.y)){
      endGame();
    }
  }

  function canPlace(shape, ox, oy){
    for (var i=0;i<shape.length;i++){
      var x = ox + shape[i][0];
      var y = oy + shape[i][1];
      if (x < 0 || x >= COLS || y >= ROWS) return false;
      if (y >= 0 && grid[y][x]) return false;
    }
    return true;
  }

  function merge(){
    var s = current.shape;
    for (var i=0;i<s.length;i++){
      var x = current.x + s[i][0];
      var y = current.y + s[i][1];
      if (y >= 0 && y < ROWS && x >= 0 && x < COLS) grid[y][x] = current.type;
    }
  }

  function clearLines(){
    var cleared = 0;
    for (var y = ROWS-1; y >= 0; y--){
      var full = true;
      for (var x=0;x<COLS;x++){ if (!grid[y][x]) { full = false; break; } }
      if (full){
        grid.splice(y,1);
        var empty = [];
        for (var x2=0;x2<COLS;x2++) empty.push(null);
        grid.unshift(empty);
        cleared++;
        y++;
      }
    }
    if (cleared > 0){
      var points = [0,100,300,500,800][cleared] * level;
      score += points;
      lines += cleared;
      var newLevel = Math.floor(lines / 10) + 1;
      if (newLevel !== level){
        level = newLevel;
        dropMs = Math.max(80, 800 - (level-1) * 70);
      }
      updateHud();
    }
  }

  function updateHud(){
    scoreEl.textContent = score;
    linesEl.textContent = lines;
    levelEl.textContent = level;
  }

  function move(dx, dy){
    if (!current || gameOver || paused) return false;
    if (canPlace(current.shape, current.x + dx, current.y + dy)){
      current.x += dx; current.y += dy;
      return true;
    }
    return false;
  }

  function rotateCurrent(){
    if (!current || gameOver || paused) return;
    if (current.type === 'O') return;
    var rotated = rotate(current.shape);
    // simple wall kicks
    var kicks = [[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,-1]];
    for (var i=0;i<kicks.length;i++){
      var kx = kicks[i][0], ky = kicks[i][1];
      if (canPlace(rotated, current.x + kx, current.y + ky)){
        current.shape = rotated;
        current.x += kx; current.y += ky;
        return;
      }
    }
  }

  function softDrop(){
    if (!move(0,1)) lock();
    else { score += 1; updateHud(); }
  }

  function hardDrop(){
    if (!current || gameOver || paused) return;
    var d = 0;
    while (canPlace(current.shape, current.x, current.y + 1)){
      current.y++; d++;
    }
    score += d * 2;
    updateHud();
    lock();
  }

  function lock(){
    merge();
    clearLines();
    if (!gameOver) spawn();
  }

  function endGame(){
    gameOver = true;
    running = false;
    finalScoreEl.textContent = score;
    finalLinesEl.textContent = lines;
    finalLevelEl.textContent = level;
    overO.classList.remove('hidden');
  }

  function drawCell(c, x, y, color, size){
    var px = x*size, py = y*size;
    c.fillStyle = color;
    c.fillRect(px+1, py+1, size-2, size-2);
    c.fillStyle = 'rgba(255,255,255,0.18)';
    c.fillRect(px+1, py+1, size-2, 2);
    c.fillStyle = 'rgba(0,0,0,0.25)';
    c.fillRect(px+1, py+size-3, size-2, 2);
  }

  function draw(){
    ctx.fillStyle = '#07070F';
    ctx.fillRect(0,0,cv.width,cv.height);
    // grid lines
    ctx.strokeStyle = 'rgba(34,211,238,0.05)';
    for (var i=1;i<COLS;i++){ ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,cv.height); ctx.stroke(); }
    for (var j=1;j<ROWS;j++){ ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(cv.width,j*CELL); ctx.stroke(); }
    // settled
    for (var y=0;y<ROWS;y++){
      for (var x=0;x<COLS;x++){
        if (grid[y][x]) drawCell(ctx, x, y, COLORS[grid[y][x]], CELL);
      }
    }
    // ghost
    if (current && !gameOver){
      var gy = current.y;
      while (canPlace(current.shape, current.x, gy+1)) gy++;
      ctx.globalAlpha = 0.22;
      for (var k=0;k<current.shape.length;k++){
        drawCell(ctx, current.x + current.shape[k][0], gy + current.shape[k][1], COLORS[current.type], CELL);
      }
      ctx.globalAlpha = 1;
      // current
      for (var m=0;m<current.shape.length;m++){
        var cx = current.x + current.shape[m][0];
        var cy = current.y + current.shape[m][1];
        if (cy >= 0) drawCell(ctx, cx, cy, COLORS[current.type], CELL);
      }
    }
    // next preview
    nctx.fillStyle = '#07070F';
    nctx.fillRect(0,0,nextCv.width,nextCv.height);
    if (nextType){
      var sh = SHAPES[nextType];
      // center it in 4x4
      var minX=4,minY=4,maxX=-1,maxY=-1;
      for (var p=0;p<sh.length;p++){
        if (sh[p][0]<minX) minX=sh[p][0];
        if (sh[p][1]<minY) minY=sh[p][1];
        if (sh[p][0]>maxX) maxX=sh[p][0];
        if (sh[p][1]>maxY) maxY=sh[p][1];
      }
      var w = maxX-minX+1, h = maxY-minY+1;
      var offX = (4 - w)/2 - minX;
      var offY = (4 - h)/2 - minY;
      for (var q=0;q<sh.length;q++){
        drawCell(nctx, sh[q][0]+offX, sh[q][1]+offY, COLORS[nextType], NCELL);
      }
    }
  }

  function loop(now){
    if (!started) return;
    var dt = now - last;
    last = now;
    if (running && !paused && !gameOver){
      acc += dt;
      while (acc >= dropMs){
        acc -= dropMs;
        if (!move(0,1)) lock();
        if (gameOver) break;
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  function startGame(){
    reset();
    started = true;
    startO.classList.add('hidden');
    overO.classList.add('hidden');
    pauseO.classList.add('hidden');
    last = performance.now();
    requestAnimationFrame(loop);
  }

  function togglePause(){
    if (!started || gameOver) return;
    paused = !paused;
    if (paused) pauseO.classList.remove('hidden');
    else { pauseO.classList.add('hidden'); last = performance.now(); }
  }

  window.addEventListener('keydown', function(e){
    var k = e.key;
    if (k === 'ArrowLeft') { move(-1,0); e.preventDefault(); }
    else if (k === 'ArrowRight') { move(1,0); e.preventDefault(); }
    else if (k === 'ArrowDown') { softDrop(); e.preventDefault(); }
    else if (k === 'ArrowUp') { rotateCurrent(); e.preventDefault(); }
    else if (k === ' ') { hardDrop(); e.preventDefault(); }
    else if (k === 'p' || k === 'P') { togglePause(); }
    else if (k === 'Enter') { if (!started || gameOver) startGame(); }
  }, {passive:false});

  // on-screen buttons
  document.querySelectorAll('#controls button').forEach(function(b){
    b.addEventListener('click', function(){
      var a = b.getAttribute('data-act');
      if (a === 'left') move(-1,0);
      else if (a === 'right') move(1,0);
      else if (a === 'rotate') rotateCurrent();
      else if (a === 'soft') softDrop();
      else if (a === 'hard') hardDrop();
      else if (a === 'pause') togglePause();
    });
  });

  // basic swipe on the board (mobile)
  var ts = null;
  cv.addEventListener('touchstart', function(e){
    if (e.touches.length===1) ts = {x:e.touches[0].clientX, y:e.touches[0].clientY, t:Date.now()};
  }, {passive:true});
  cv.addEventListener('touchend', function(e){
    if (!ts) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - ts.x, dy = t.clientY - ts.y;
    var adx = Math.abs(dx), ady = Math.abs(dy);
    var dt = Date.now() - ts.t;
    if (adx < 8 && ady < 8 && dt < 250){ rotateCurrent(); }
    else if (adx > ady){
      if (adx > 60 && dt < 350) { if (dx>0) move(1,0); else move(-1,0); }
    } else {
      if (dy > 80 && dt < 350) hardDrop();
      else if (dy > 30) softDrop();
    }
    ts = null;
  }, {passive:true});

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn2').addEventListener('click', startGame);
  document.getElementById('resumeBtn').addEventListener('click', togglePause);
  document.getElementById('pauseBtn').addEventListener('click', togglePause);

  // initial paint
  reset();
  started = false;
  draw();
})();
</script>
</body>
</html>
